services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: radar-pg
    restart: unless-stopped
    # 调优：服务器 7.8GB RAM，数据库 ~50GB；shared_buffers 2GB 让索引基本 cache 内存
    # 避免 ON CONFLICT (uq_swaps_dedup) 时大量 random read 落磁盘 → DataFileRead wait
    command:
      - postgres
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=5GB
      - -c
      - work_mem=32MB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - max_wal_size=4GB
      - -c
      - checkpoint_timeout=15min
      - -c
      - random_page_cost=1.1
      - -c
      - max_connections=100
      - -c
      - synchronous_commit=off
    environment:
      POSTGRES_DB: radar
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radar}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      # 只绑 127.0.0.1，公网不暴露 PG（要远程查走 SSH 隧道）
      - "127.0.0.1:${PG_HOST_PORT:-5434}:5432"
    volumes:
      - radar-pg-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d radar"]
      interval: 5s
      timeout: 3s
      retries: 5

  radar:
    build: .
    container_name: radar-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # 容器内走 docker 内部网络（service name），不依赖宿主端口
      DATABASE_URL: postgresql://radar:${POSTGRES_PASSWORD:-radar}@postgres:5432/radar
      BSC_WSS_URL: ${BSC_WSS_URL}
      OKX_API_KEY: ${OKX_API_KEY}
      OKX_SECRET_KEY: ${OKX_SECRET_KEY}
      OKX_PASSPHRASE: ${OKX_PASSPHRASE}
      ANOMALY_VOL_SPIKE_RATIO: ${ANOMALY_VOL_SPIKE_RATIO:-5}
      ANOMALY_FEE_TVL_APR: ${ANOMALY_FEE_TVL_APR:-100}
      ANOMALY_DETECT_INTERVAL_MS: ${ANOMALY_DETECT_INTERVAL_MS:-30000}
      ANOMALY_COOLDOWN_MS: ${ANOMALY_COOLDOWN_MS:-300000}
      ANOMALY_BASELINE_MIN_COVERAGE_MS: ${ANOMALY_BASELINE_MIN_COVERAGE_MS:-3600000}
      NOTIFY_FEISHU_WEBHOOK: ${NOTIFY_FEISHU_WEBHOOK:-}
      NOTIFY_FEISHU_SECRET: ${NOTIFY_FEISHU_SECRET:-}

volumes:
  radar-pg-data:
